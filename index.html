<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ID Card Scanner</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin: 20px; }
    video { 
      width: 400px; 
      height: 252px; /* ID card ratio */
      object-fit: cover; 
      border: 1px solid #000; 
      margin: 10px; 
    }
    canvas { display:none; }
    button { margin: 5px; padding: 10px 20px; font-size: 16px; }
    #status { margin-top: 15px; font-weight: bold; }
    #overlay {
      position: absolute;
      border: 3px dashed red;
      pointer-events: none;
    }
    .video-container {
      display: inline-block;
      position: relative;
    }
  </style>
</head>
<body>
  <h1>ID Card Scanner</h1>
  <button id="startCamera">Start Camera</button><br>
  
  <div class="video-container">
    <video id="video" autoplay playsinline></video>
    <div id="overlay"></div>
  </div>
  
  <canvas id="canvas"></canvas><br>
  
  <button id="capture">Capture</button>
  <button id="nextId">Next ID</button>
  <button id="complete">Complete</button>
  
  <div id="status">Status: Camera not started</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const overlay = document.getElementById('overlay');

    let stream;
    let captureStep = 0; // 0 = front, 1 = back
    let currentCard = {};
    let cards = [];

    const ID_RATIO = 1.586; 
    const ID_WIDTH = 400;   
    const ID_HEIGHT = Math.round(ID_WIDTH / ID_RATIO);
    canvas.width = ID_WIDTH;
    canvas.height = ID_HEIGHT;

    function updateOverlay() {
      const vw = video.clientWidth;
      const vh = video.clientHeight;
      let ow = vw * 0.9;
      let oh = ow / ID_RATIO;
      if (oh > vh * 0.9) {
        oh = vh * 0.9;
        ow = oh * ID_RATIO;
      }
      overlay.style.width = ow + "px";
      overlay.style.height = oh + "px";
      overlay.style.left = (vw - ow) / 2 + "px";
      overlay.style.top = (vh - oh) / 2 + "px";
    }

    window.addEventListener("resize", updateOverlay);
    video.addEventListener("loadedmetadata", updateOverlay);

    document.getElementById('startCamera').onclick = async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" }
        });
        video.srcObject = stream;
        status.textContent = "Status: Back camera started (ID card ratio preview)";
      } catch (err) {
        status.textContent = "Error: " + err.message;
      }
    };

    // Sharpening function
    function sharpen(ctx, width, height) {
      const imageData = ctx.getImageData(0, 0, width, height);
      const data = imageData.data;
      const weights = [0, -1, 0, -1, 5, -1, 0, -1, 0];
      const side = 3;
      const halfSide = 1;
      const output = ctx.createImageData(width, height);
      const dst = output.data;

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          for (let c = 0; c < 3; c++) {
            let i = (y * width + x) * 4 + c;
            let value = 0;
            for (let cy = 0; cy < side; cy++) {
              for (let cx = 0; cx < side; cx++) {
                let scy = y + cy - halfSide;
                let scx = x + cx - halfSide;
                if (scy >= 0 && scy < height && scx >= 0 && scx < width) {
                  let si = (scy * width + scx) * 4 + c;
                  value += data[si] * weights[cy * side + cx];
                }
              }
            }
            dst[i] = Math.min(Math.max(value, 0), 255);
          }
          dst[(y * width + x) * 4 + 3] = 255;
        }
      }
      ctx.putImageData(output, 0, 0);
    }

    // Capture with stronger scanner-like effect
    document.getElementById('capture').onclick = () => {
      const videoRatio = video.videoWidth / video.videoHeight;
      let sx, sy, sWidth, sHeight;

      if (videoRatio > ID_RATIO) {
        sHeight = video.videoHeight;
        sWidth = sHeight * ID_RATIO;
        sx = (video.videoWidth - sWidth) / 2;
        sy = 0;
      } else {
        sWidth = video.videoWidth;
        sHeight = sWidth / ID_RATIO;
        sx = 0;
        sy = (video.videoHeight - sHeight) / 2;
      }

      // Apply stronger scanner-like filter
      ctx.filter = "contrast(2.0) brightness(1.5) grayscale(0.5)";
      ctx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, canvas.width, canvas.height);
      ctx.filter = "none";

      // Apply sharpening
      sharpen(ctx, canvas.width, canvas.height);

      const imageData = canvas.toDataURL("image/jpeg", 0.95);

      if (captureStep === 0) {
        currentCard.front = imageData;
        status.textContent = "Front side captured. Now scan back side.";
        captureStep = 1;
      } else {
        currentCard.back = imageData;
        status.textContent = "Back side captured. Click Next ID or Complete.";
        captureStep = 0;
      }
    };

    document.getElementById('nextId').onclick = () => {
      if (currentCard.front && currentCard.back) {
        cards.push(currentCard);
        currentCard = {};
        status.textContent = "Ready for next ID. Capture front side.";
      } else {
        status.textContent = "Please capture both sides before moving to next ID.";
      }
    };

    document.getElementById('complete').onclick = () => {
      if (currentCard.front && currentCard.back) {
        cards.push(currentCard);
        currentCard = {};
      }
      if (cards.length === 0) {
        status.textContent = "No ID cards captured.";
        return;
      }

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();

      cards.forEach((card, index) => {
        if (index > 0) pdf.addPage();

        const imgWidth = 160;
        const imgHeight = imgWidth / ID_RATIO;
        const pageWidth = pdf.internal.pageSize.getWidth();

        const xFront = (pageWidth - imgWidth) / 2;
        const yFront = 30;
        pdf.addImage(card.front, "JPEG", xFront, yFront, imgWidth, imgHeight);

        const xBack = (pageWidth - imgWidth) / 2;
        const yBack = yFront + imgHeight + 25;
        pdf.addImage(card.back, "JPEG", xBack, yBack, imgWidth, imgHeight);
      });

      pdf.save("IDCards.pdf");
      status.textContent = "PDF generated with " + cards.length + " ID cards.";
      cards = [];
    };
  </script>
</body>
</html>
