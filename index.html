<!DOCTYPE html>
<html>
<head>
  <title>ID Card Scanner PDF</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #f4f4f4;
    }

    video {
      width: 90%;
      max-width: 400px;
      border-radius: 10px;
      margin-top: 10px;
    }

    canvas {
      display: none;
    }

    .frame {
      position: relative;
      display: inline-block;
    }

    .overlay {
      position: absolute;
      border: 3px solid red;
      width: 85%;
      height: 55%;
      top: 22%;
      left: 7.5%;
      pointer-events: none;
      border-radius: 10px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
    }

    #completeBtn {
      background: green;
      color: white;
    }

    #nextBtn {
      background: orange;
      color: white;
    }

    #captureBtn {
      background: blue;
      color: white;
    }
  </style>
</head>

<body>

<h2>ID Card Scanner</h2>

<div class="frame">
  <video id="video" autoplay></video>
  <div class="overlay"></div>
</div>

<br>

<button id="captureBtn">Capture</button>
<button id="nextBtn">Next ID</button>
<button id="completeBtn">Complete</button>

<canvas id="canvas"></canvas>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const captureBtn = document.getElementById('captureBtn');
  const nextBtn = document.getElementById('nextBtn');
  const completeBtn = document.getElementById('completeBtn');

  let ids = [];
  let currentFront = null;
  let currentBack = null;
  let isFront = true;

  // Start Camera
  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => {
      video.srcObject = stream;
    });

  captureBtn.onclick = () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);

    const image = canvas.toDataURL("image/jpeg");

    if (isFront) {
      currentFront = image;
      alert("Front captured. Now scan back side.");
      isFront = false;
    } else {
      currentBack = image;
      alert("Back captured.");
      isFront = true;
    }
  };

  nextBtn.onclick = () => {
    if (currentFront && currentBack) {
      ids.push({ front: currentFront, back: currentBack });
      currentFront = null;
      currentBack = null;
      alert("ID saved. Scan next ID.");
    } else {
      alert("Please capture both sides first.");
    }
  };

  completeBtn.onclick = () => {
    if (currentFront && currentBack) {
      ids.push({ front: currentFront, back: currentBack });
    }

    if (ids.length === 0) {
      alert("No IDs scanned.");
      return;
    }

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();

    ids.forEach((id, index) => {
      if (index !== 0) pdf.addPage();

      pdf.addImage(id.front, 'JPEG', 10, 20, 180, 60);
      pdf.addImage(id.back, 'JPEG', 10, 100, 180, 60);
    });

    pdf.save("ID_Cards.pdf");
  };
</script>

</body>
</html>
