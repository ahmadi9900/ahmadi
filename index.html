<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ID Card Scanner</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin: 20px; }
    video { width: 400px; height: 252px; object-fit: cover; border: 1px solid #000; margin: 10px; }
    canvas { display:none; }
    #status { margin-top: 15px; font-weight: bold; }
    #overlay { position: absolute; border: 3px dashed red; pointer-events: none; }
    .video-container { display: inline-block; position: relative; margin-bottom: 25px; }

    .button-column {
      display: flex; flex-direction: column; align-items: center;
      gap: 20px; margin-top: 10px;
    }
    button {
      padding: 24px 48px; font-size: 24px; border: none; border-radius: 12px;
      cursor: pointer; background: #3498db; color: #fff;
      transition: background 0.3s ease, transform 0.2s ease;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2); width: 260px;
    }
    button:hover { background: #2980b9; transform: translateY(-2px); }
    button:active { transform: translateY(0); }

    #startCamera { background: #27ae60; }
    #capture { background: #e67e22; }
    #nextId { background: #9b59b6; }
    #complete { background: #c0392b; }
  </style>
</head>
<body>
  <h1>ID Card Scanner</h1>
  
  <div class="video-container">
    <video id="video" autoplay playsinline></video>
    <div id="overlay"></div>
  </div>
  
  <canvas id="canvas"></canvas>
  
  <div class="button-column">
    <button id="startCamera">Start Camera</button>
    <button id="capture">Capture</button>
    <button id="nextId">Next ID</button>
    <button id="complete">Complete</button>
  </div>
  
  <div id="status">Status: Camera not started</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const overlay = document.getElementById('overlay');

    let stream;
    let captureStep = 0;
    let currentCard = {};
    let cards = [];

    const ID_RATIO = 1.586; 
    const ID_WIDTH = 400;   
    const ID_HEIGHT = Math.round(ID_WIDTH / ID_RATIO);
    canvas.width = ID_WIDTH;
    canvas.height = ID_HEIGHT;

    function updateOverlay() {
      const vw = video.clientWidth;
      const vh = video.clientHeight;
      let ow = vw * 0.9;
      let oh = ow / ID_RATIO;
      if (oh > vh * 0.9) {
        oh = vh * 0.9;
        ow = oh * ID_RATIO;
      }
      overlay.style.width = ow + "px";
      overlay.style.height = oh + "px";
      overlay.style.left = (vw - ow) / 2 + "px";
      overlay.style.top = (vh - oh) / 2 + "px";
    }

    window.addEventListener("resize", updateOverlay);
    video.addEventListener("loadedmetadata", updateOverlay);

    document.getElementById('startCamera').onclick = async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        status.textContent = "Status: Back camera started (ID card ratio preview)";
      } catch (err) {
        status.textContent = "Error: " + err.message;
      }
    };

    // Gentle sharpening kernel
    function sharpen(ctx, width, height) {
      const imageData = ctx.getImageData(0, 0, width, height);
      const data = imageData.data;
      const weights = [0, -0.25, 0, -0.25, 2, -0.25, 0, -0.25, 0];
      const side = 3;
      const halfSide = 1;
      const output = ctx.createImageData(width, height);
      const dst = output.data;

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          for (let c = 0; c < 3; c++) {
            let i = (y * width + x) * 4 + c;
            let value = 0;
            for (let cy = 0; cy < side; cy++) {
              for (let cx = 0; cx < side; cx++) {
                let scy = y + cy - halfSide;
                let scx = x + cx - halfSide;
                if (scy >= 0 && scy < height && scx >= 0 && scx < width) {
                  let si = (scy * width + scx) * 4 + c;
                  value += data[si] * weights[cy * side + cx];
                }
              }
            }
            dst[i] = Math.min(Math.max(value, 0), 255);
          }
          dst[(y * width + x) * 4 + 3] = 255;
        }
      }
      ctx.putImageData(output, 0, 0);
    }

    // Scanner-like processing with smoother contrast and black point
    function processImage() {
      let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      let data = imageData.data;
      for (let i = 0; i < data.length; i += 4) {
        // Brightness boost
        data[i]   = Math.min(255, data[i]   + 20);
        data[i+1] = Math.min(255, data[i+1] + 20);
        data[i+2] = Math.min(255, data[i+2] + 20);

        // Contrast adjustment
        let contrast = 1.3;
        data[i]   = Math.min(255, Math.max(0, ((data[i]-128) * contrast + 128)));
        data[i+1] = Math.min(255, Math.max(0, ((data[i+1]-128) * contrast + 128)));
        data[i+2] = Math.min(255, Math.max(0, ((data[i+2]-128) * contrast + 128)));

        // Raise black point slightly
        data[i]   = data[i]   < 40 ? 0 : data[i];
        data[i+1] = data[i+1] < 40 ? 0 : data[i+1];
        data[i+2] = data[i+2] < 40 ? 0 : data[i+2];
      }
      ctx.putImageData(imageData, 0, 0);

      // Apply gentle sharpening
      sharpen(ctx, canvas.width, canvas.height);
    }

    document.getElementById('capture').onclick = () => {
      const videoRatio = video.videoWidth / video.videoHeight;
      let sx, sy, sWidth, sHeight;

      if (videoRatio > ID_RATIO) {
        sHeight = video.videoHeight;
        sWidth = sHeight * ID_RATIO;
        sx = (video.videoWidth - sWidth) / 2;
        sy = 0;
      } else {
        sWidth = video.videoWidth;
        sHeight = sWidth / ID_RATIO;
        sx = 0;
        sy = (video.videoHeight - sHeight) / 2;
      }

      ctx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, canvas.width, canvas.height);

      // Apply scanner-like processing
      processImage();

      const imageData = canvas.toDataURL("image/jpeg", 0.95);

      if (captureStep === 0) {
        currentCard.front = imageData;
        status.textContent = "Front side captured. Now scan back side.";
        captureStep = 1;
      } else {
        currentCard.back = imageData;
        status.textContent = "Back side captured. Click Next ID or Complete.";
        captureStep = 0;
