<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID Card Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  text-align:center;
  font-family:Arial;
  background:#f2f2f2;
}

h2{ margin-top:15px; }

video{
  width:95%;
  max-width:420px;
  aspect-ratio:1.586;
  object-fit:cover;
  background:black;
  border-radius:15px;
  margin-top:10px;
}

button{
  padding:12px 20px;
  margin:6px;
  font-size:15px;
  border:none;
  border-radius:8px;
  color:white;
}

#startBtn{ background:#333; }
#captureBtn{ background:#0066ff; }
#nextBtn{ background:#ff9900; }
#completeBtn{ background:#28a745; }

#status{
  margin-top:10px;
  font-weight:bold;
}

canvas{ display:none; }
</style>
</head>

<body>

<h2>ID Card Scanner</h2>

<button id="startBtn">Start Camera</button>

<br>

<video id="video" playsinline autoplay muted></video>

<br>

<button id="captureBtn">Capture</button>
<button id="nextBtn">Next ID</button>
<button id="completeBtn">Complete</button>

<div id="status">Status: Camera not started</div>

<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const statusText = document.getElementById("status");

let stream;
let ids = [];
let currentFront = null;
let currentBack = null;
let isFront = true;

// START CAMERA (only once)
document.getElementById("completeBtn").onclick = () => {

  if(currentFront && currentBack){
    ids.push({front:currentFront, back:currentBack});
  }

  if(ids.length === 0){
    statusText.innerText = "No IDs scanned";
    return;
  }

  const { jsPDF } = window.jspdf;

  // Real ID ratio page
  const pageWidth = 85.6; // mm
  const pageHeight = 53.98; // mm

  const pdf = new jsPDF({
    orientation: "landscape",
    unit: "mm",
    format: [pageWidth, pageHeight]
  });

  ids.forEach((id, index) => {

    if(index !== 0){
      pdf.addPage([pageWidth, pageHeight], "landscape");
    }

    // slight zoom crop (5%)
    function zoomAndAdd(imgData){
      const img = new Image();
      img.src = imgData;

      const tempCanvas = document.createElement("canvas");
      const ctx = tempCanvas.getContext("2d");

      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;

      const zoom = 0.95;
      const sw = canvas.width * zoom;
      const sh = canvas.height * zoom;
      const sx = (canvas.width - sw) / 2;
      const sy = (canvas.height - sh) / 2;

      ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);

      return tempCanvas.toDataURL("image/png");
    }

    const frontImg = id.front;
    pdf.addImage(frontImg, "PNG", 0, 0, pageWidth, pageHeight);

    pdf.addPage([pageWidth, pageHeight], "landscape");
    pdf.addImage(id.back, "PNG", 0, 0, pageWidth, pageHeight);

  });

  pdf.save("ID_Cards.pdf");
  statusText.innerText = "PDF Generated Successfully";
};
</script>

</body>
</html>
