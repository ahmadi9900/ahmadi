<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ID Card Scanner</title>
  <style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 15px;
  }

  h1 {
    color: #ffffff;
    margin-bottom: 25px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .video-container {
    position: relative;
    background: #ffffff;
    padding: 20px;
    border-radius: 18px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.25);
    margin-bottom: 30px;
  }

  video {
    width: 400px;
    height: 252px;
    object-fit: cover;
    border-radius: 12px;
    border: 2px solid #eee;
  }

  canvas { display: none; }

  #overlay {
    position: absolute;
    border: 3px dashed #ff4d4d;
    border-radius: 12px;
    pointer-events: none;
  }

  .button-column {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    width: 100%;
    max-width: 320px;
  }

  button {
    width: 100%;
    padding: 18px;
    font-size: 18px;
    font-weight: 600;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    color: white;
    transition: all 0.25s ease;
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
  }

  button:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.35);
  }

  button:active {
    transform: scale(0.98);
  }

  #startCamera {
    background: linear-gradient(135deg, #00c853, #009624);
  }

  #capture {
    background: linear-gradient(135deg, #ff9800, #ef6c00);
  }

  #nextId {
    background: linear-gradient(135deg, #7e57c2, #512da8);
  }

  #complete {
    background: linear-gradient(135deg, #e53935, #b71c1c);
  }

  #status {
    margin-top: 25px;
    background: rgba(255,255,255,0.15);
    padding: 12px 20px;
    border-radius: 12px;
    color: #ffffff;
    font-weight: 500;
    backdrop-filter: blur(8px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  @media (max-width: 480px) {
    video {
      width: 100%;
      height: auto;
    }
  }
</style>
</head>
<body>
  <h1>ID Card Scanner</h1>
  
  <div class="video-container">
    <video id="video" autoplay playsinline></video>
    <div id="overlay"></div>
  </div>
  
  <canvas id="canvas"></canvas>
  
  <div class="button-column">
    <button id="startCamera">Start Camera</button>
    <button id="capture">Capture</button>
    <button id="nextId">Next ID</button>
    <button id="complete">Complete</button>
  </div>
  
  <div id="status">Status: Camera not started</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const overlay = document.getElementById('overlay');

    let stream;
    let captureStep = 0;
    let currentCard = {};
    let cards = [];

    const ID_RATIO = 1.586; 
    const ID_WIDTH = 1200;   // High resolution capture
    const ID_HEIGHT = Math.round(ID_WIDTH / ID_RATIO);
    canvas.width = ID_WIDTH;
    canvas.height = ID_HEIGHT;

    function updateOverlay() {
      const vw = video.clientWidth;
      const vh = video.clientHeight;
      let ow = vw * 0.9;
      let oh = ow / ID_RATIO;
      if (oh > vh * 0.9) {
        oh = vh * 0.9;
        ow = oh * ID_RATIO;
      }
      overlay.style.width = ow + "px";
      overlay.style.height = oh + "px";
      overlay.style.left = (vw - ow) / 2 + "px";
      overlay.style.top = (vh - oh) / 2 + "px";
    }

    window.addEventListener("resize", updateOverlay);
    video.addEventListener("loadedmetadata", updateOverlay);

    document.getElementById('startCamera').onclick = async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment",
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          }
        });
        video.srcObject = stream;
        status.textContent = "Status: HD Back camera started";
      } catch (err) {
        status.textContent = "Error: " + err.message;
      }
    };

    function processImage() {
      let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      let data = imageData.data;

      const contrast = 1.6;
      const brightness = 10;
      const blackBoost = 15;

      for (let i = 0; i < data.length; i += 4) {
        data[i]   = ((data[i] - 128) * contrast + 128) + brightness;
        data[i+1] = ((data[i+1] - 128) * contrast + 128) + brightness;
        data[i+2] = ((data[i+2] - 128) * contrast + 128) + brightness;

        if (data[i] < 100) data[i] -= blackBoost;
        if (data[i+1] < 100) data[i+1] -= blackBoost;
        if (data[i+2] < 100) data[i+2] -= blackBoost;

        data[i] = Math.max(0, Math.min(255, data[i]));
        data[i+1] = Math.max(0, Math.min(255, data[i+1]));
        data[i+2] = Math.max(0, Math.min(255, data[i+2]));
      }

      ctx.putImageData(imageData, 0, 0);

      applyConvolution([
         0, -1,  0,
        -1,  5, -1,
         0, -1,  0
      ]);
    }

    function applyConvolution(kernel) {
      const side = 3;
      const halfSide = 1;

      const src = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const sw = src.width;
      const sh = src.height;
      const srcData = src.data;

      const output = ctx.createImageData(sw, sh);
      const dstData = output.data;

      for (let y = 0; y < sh; y++) {
        for (let x = 0; x < sw; x++) {
          let r = 0, g = 0, b = 0;

          for (let ky = 0; ky < side; ky++) {
            for (let kx = 0; kx < side; kx++) {
              const scy = y + ky - halfSide;
              const scx = x + kx - halfSide;
              if (scy >= 0 && scy < sh && scx >= 0 && scx < sw) {
                const srcOffset = (scy * sw + scx) * 4;
                const wt = kernel[ky * side + kx];
                r += srcData[srcOffset] * wt;
                g += srcData[srcOffset+1] * wt;
                b += srcData[srcOffset+2] * wt;
              }
            }
          }

          const dstOffset = (y * sw + x) * 4;
          dstData[dstOffset] = Math.min(255, Math.max(0, r));
          dstData[dstOffset+1] = Math.min(255, Math.max(0, g));
          dstData[dstOffset+2] = Math.min(255, Math.max(0, b));
          dstData[dstOffset+3] = 255;
        }
      }

      ctx.putImageData(output, 0, 0);
    }

    document.getElementById('capture').onclick = () => {
      const videoRatio = video.videoWidth / video.videoHeight;
      let sx, sy, sWidth, sHeight;

      if (videoRatio > ID_RATIO) {
        sHeight = video.videoHeight;
        sWidth = sHeight * ID_RATIO;
        sx = (video.videoWidth - sWidth) / 2;
        sy = 0;
      } else {
        sWidth = video.videoWidth;
        sHeight = sWidth / ID_RATIO;
        sx = 0;
        sy = (video.videoHeight - sHeight) / 2;
      }

      ctx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, canvas.width, canvas.height);
      processImage();

      const imageData = canvas.toDataURL("image/jpeg", 0.85);

      if (captureStep === 0) {
        currentCard.front = imageData;
        status.textContent = "Front side captured. Now scan back side.";
        captureStep = 1;
      } else {
        currentCard.back = imageData;
        status.textContent = "Back side captured. Click Next ID or Complete.";
        captureStep = 0;
      }
    };

    document.getElementById('nextId').onclick = () => {
      if (currentCard.front && currentCard.back) {
        cards.push(currentCard);
        currentCard = {};
        status.textContent = "Ready for next ID. Capture front side.";
      } else {
        status.textContent = "Please capture both sides first.";
      }
    };

    document.getElementById('complete').onclick = () => {
      if (currentCard.front && currentCard.back) {
        cards.push(currentCard);
        currentCard = {};
      }
      if (cards.length === 0) {
        status.textContent = "No ID cards captured.";
        return;
      }

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();

      cards.forEach((card, index) => {
        if (index > 0) pdf.addPage();

        const imgWidth = 160;
        const imgHeight = imgWidth / ID_RATIO;
        const pageWidth = pdf.internal.pageSize.getWidth();

        const x = (pageWidth - imgWidth) / 2;
        const yFront = 30;

        pdf.addImage(card.front, "JPEG", x, yFront, imgWidth, imgHeight);
        pdf.addImage(card.back, "JPEG", x, yFront + imgHeight + 25, imgWidth, imgHeight);
      });

      pdf.save("IDCards_Optimized.pdf");
      status.textContent = "Optimized high-quality PDF generated.";
      cards = [];
    };
  </script>
</body>
</html>
