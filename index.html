<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ID Card Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 3vw;
}
h1 {
  color: #fff;
  margin-bottom: 5vw;
  font-weight: 600;
  font-size: 6vw;
}
.video-container {
  position: relative;
  background: #fff;
  padding: 4vw;
  border-radius: 4vw;
  box-shadow: 0 4vw 10vw rgba(0,0,0,0.25);
  margin-bottom: 5vw;
  width: 90vw;
  max-width: 500px;
}
video {
  width: 100%;
  border-radius: 3vw;
}
canvas { display:none; }

#overlay {
  position:absolute;
  border:3px dashed #ff4d4d;
  border-radius:3vw;
  pointer-events:none;
}

.button-column {
  display:flex;
  flex-direction:column;
  gap:3vw;
  width:90vw;
  max-width:400px;
}
button {
  width:100%;
  padding:4vw;
  font-size:4vw;
  font-weight:600;
  border:none;
  border-radius:3vw;
  color:white;
  cursor:pointer;
}
#startCamera { background:#00c853; }
#capture { background:#ff9800; }
#nextId { background:#7e57c2; }
#complete { background:#e53935; }

#status {
  margin-top:4vw;
  color:white;
  font-size:4vw;
}
</style>
</head>

<body>

<h1>ID Card Scanner</h1>

<div class="video-container">
  <video id="video" autoplay playsinline></video>
  <div id="overlay"></div>
</div>

<canvas id="canvas"></canvas>

<div class="button-column">
  <button id="startCamera">Start Camera</button>
  <button id="capture">Capture</button>
  <button id="nextId">Next ID</button>
  <button id="complete">Complete</button>
</div>

<div id="status">Camera not started</div>

<script async src="https://docs.opencv.org/4.x/opencv.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');
const overlay = document.getElementById('overlay');

let captureStep=0, currentCard={}, cards=[];
const ID_RATIO=1.586;

canvas.width=2000;
canvas.height=Math.round(canvas.width/ID_RATIO);

function updateOverlay(){
  const cw=video.parentElement.clientWidth;
  const ch=video.parentElement.clientHeight;
  let ow=cw*0.9;
  let oh=ow/ID_RATIO;
  if(oh>ch*0.9){ oh=ch*0.9; ow=oh*ID_RATIO;}
  overlay.style.width=ow+"px";
  overlay.style.height=oh+"px";
  overlay.style.left=(cw-ow)/2+"px";
  overlay.style.top=(ch-oh)/2+"px";
}

video.addEventListener("loadedmetadata",updateOverlay);
window.addEventListener("resize",updateOverlay);

document.getElementById('startCamera').onclick=async()=>{
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:"environment"}
    });
    video.srcObject=stream;
    status.textContent="Camera Started";
  }catch(e){
    status.textContent="Camera Error";
  }
};

function processImage(){

  ctx.drawImage(video,0,0,canvas.width,canvas.height);

  if(typeof cv==='undefined') return;

  let src=cv.imread(canvas);
  let gray=new cv.Mat();
  let sharp=new cv.Mat();
  let dst=new cv.Mat();

  // Convert to grayscale
  cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);

  // Sharpen kernel
  let kernel=cv.matFromArray(3,3,cv.CV_32F,[
    0,-1,0,
    -1,5,-1,
    0,-1,0
  ]);
  cv.filter2D(gray,sharp,cv.CV_8U,kernel);

  // Adaptive threshold (scanner effect)
  cv.adaptiveThreshold(
    sharp,
    dst,
    255,
    cv.ADAPTIVE_THRESH_GAUSSIAN_C,
    cv.THRESH_BINARY,
    15,
    10
  );

  cv.imshow(canvas,dst);

  src.delete(); gray.delete(); sharp.delete(); dst.delete(); kernel.delete();
}

document.getElementById('capture').onclick=()=>{
  processImage();

  // 0.8 quality = smaller PDF but sharp
  const imageData=canvas.toDataURL("image/jpeg",0.8);

  if(captureStep===0){
    currentCard.front=imageData;
    status.textContent="Front captured. Scan back.";
    captureStep=1;
  }else{
    currentCard.back=imageData;
    status.textContent="Back captured.";
    captureStep=0;
  }
};

document.getElementById('nextId').onclick=()=>{
  if(currentCard.front && currentCard.back){
    cards.push(currentCard);
    currentCard={};
    status.textContent="Ready for next ID";
  }
};

document.getElementById('complete').onclick=()=>{
  if(currentCard.front && currentCard.back)
    cards.push(currentCard);

  if(cards.length===0){
    status.textContent="No ID captured";
    return;
  }

  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF();

  cards.forEach((card,i)=>{
    if(i>0) pdf.addPage();
    const w=170;
    const h=w/ID_RATIO;
    const pageWidth=pdf.internal.pageSize.getWidth();
    const x=(pageWidth-w)/2;
    pdf.addImage(card.front,"JPEG",x,25,w,h);
    pdf.addImage(card.back,"JPEG",x,25+h+15,w,h);
  });

  pdf.save("Sharp_ID_Cards.pdf");
  status.textContent="Sharp PDF Generated";
  cards=[];
};

</script>

</body>
</html>
