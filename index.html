<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ID Card Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  background:#f2f2f2;
  font-family:Arial;
  text-align:center;
}

#video{
  width:100%;
  max-width:500px;
  border-radius:10px;
  margin-top:10px;
}

button{
  padding:12px 20px;
  margin:10px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#000;
  color:#fff;
}

canvas{
  display:none;
}
</style>
</head>

<body>

<h2>ID Card Scanner</h2>

<video id="video" autoplay playsinline></video>
<br>

<button onclick="captureFront()">Capture Front</button>
<button onclick="captureBack()">Capture Back</button>
<button onclick="generatePDF()">Generate PDF</button>

<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const context = canvas.getContext('2d');

let frontImage = null;
let backImage = null;

// Start Camera
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } }
})
.then(stream => {
  video.srcObject = stream;
})
.catch(err => {
  alert("Camera not working. Use HTTPS or local server.");
});

// Capture FRONT
function captureFront(){
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  context.drawImage(video, 0, 0, canvas.width, canvas.height);

  frontImage = canvas.toDataURL("image/jpeg", 1.0); // ORIGINAL quality
  alert("Front captured");
}

// Capture BACK
function captureBack(){
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  context.drawImage(video, 0, 0, canvas.width, canvas.height);

  backImage = canvas.toDataURL("image/jpeg", 1.0); // ORIGINAL quality
  alert("Back captured");
}

// Generate PDF
function generatePDF(){
  if(!frontImage || !backImage){
    alert("Capture both sides first");
    return;
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p", "mm", "a4");

  const pageWidth = 210;
  const pageHeight = 297;

  const cardWidth = 90;  // ID card size
  const cardHeight = 55;

  const centerX = (pageWidth - cardWidth) / 2;

  pdf.addImage(frontImage, 'JPEG', centerX, 80, cardWidth, cardHeight);
  pdf.addImage(backImage, 'JPEG', centerX, 150, cardWidth, cardHeight);

  pdf.save("ID_Card.pdf");
}
</script>

</body>
</html>
