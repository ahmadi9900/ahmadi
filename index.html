<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID Card Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  text-align:center;
  font-family:Arial;
  background:#f2f2f2;
}

h2{ margin-top:15px; }

video{
  width:95%;
  max-width:420px;
  aspect-ratio:1.586;
  object-fit:cover;
  background:black;
  border-radius:15px;
  margin-top:10px;
}

button{
  padding:12px 20px;
  margin:6px;
  font-size:15px;
  border:none;
  border-radius:8px;
  color:white;
}

#startBtn{ background:#333; }
#captureBtn{ background:#0066ff; }
#nextBtn{ background:#ff9900; }
#completeBtn{ background:#28a745; }

#status{
  margin-top:10px;
  font-weight:bold;
}

canvas{ display:none; }
</style>
</head>

<body>

<h2>ID Card Scanner</h2>

<button id="startBtn">Start Camera</button>

<br>

<video id="video" playsinline autoplay muted></video>

<br>

<button id="captureBtn">Capture</button>
<button id="nextBtn">Next ID</button>
<button id="completeBtn">Complete</button>

<div id="status">Status: Camera not started</div>

<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const statusText = document.getElementById("status");

let stream;
let ids = [];
let currentFront = null;
let currentBack = null;
let isFront = true;

// START CAMERA (only once)
document.getElementById("startBtn").onclick = async () => {
  if(stream) return;

  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"environment" },
      audio:false
    });

    video.srcObject = stream;
    await video.play();

    statusText.innerText = "Status: Capture FRONT side";

  }catch(err){
    statusText.innerText = "Camera Error: " + err.message;
  }
};

// CAPTURE
document.getElementById("captureBtn").onclick = () => {

  if(!stream){
    statusText.innerText = "Start camera first";
    return;
  }

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  const image = canvas.toDataURL("image/jpeg",1.0);

  if(isFront){
    currentFront = image;
    isFront = false;
    statusText.innerText = "Status: Now capture BACK side";
  }else{
    currentBack = image;
    isFront = true;
    statusText.innerText = "Status: Both sides captured. Press Next ID";
  }
};

// SAVE ID
document.getElementById("nextBtn").onclick = () => {
  if(currentFront && currentBack){
    ids.push({front:currentFront, back:currentBack});
    currentFront = null;
    currentBack = null;
    statusText.innerText = "Status: Capture FRONT side of next ID";
  }else{
    statusText.innerText = "Capture both sides first";
  }
};

// GENERATE PDF
document.getElementById("completeBtn").onclick = () => {

  if(currentFront && currentBack){
    ids.push({front:currentFront, back:currentBack});
  }

  if(ids.length === 0){
    statusText.innerText = "No IDs scanned";
    return;
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p","mm","a4");
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();
  const margin = 10; // margin around the images

  ids.forEach((id,index)=>{
    if(index !== 0) pdf.addPage();

    // Helper to add image with aspect ratio preserved
    const addImg = (imgData, yPos) => {
      const img = new Image();
      img.src = imgData;
      img.onload = () => {
        const ratio = img.width / img.height;
        const maxWidth = pageWidth - margin*2;
        const maxHeight = (pageHeight - margin*3) / 2; // 2 images per page
        let w = maxWidth;
        let h = w / ratio;

        if(h > maxHeight){
          h = maxHeight;
          w = h * ratio;
        }

        pdf.addImage(imgData, "JPEG", (pageWidth - w)/2, yPos, w, h);
      };
    };

    addImg(id.front, margin);         // top image
    addImg(id.back, pageHeight/2);    // bottom image
  });

  // Wait a little before saving so images load
  setTimeout(()=>{
    pdf.save("ID_Cards.pdf");
    statusText.innerText = "PDF Generated Successfully";
  }, 500);
};
</script>

</body>
</html>
