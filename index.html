<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ID Card Scanner</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin: 20px; }
    video { border: 1px solid #000; margin: 10px; }
    canvas { display:none; }
    button { margin: 5px; padding: 10px 20px; font-size: 16px; }
    #status { margin-top: 15px; font-weight: bold; }
    #overlay {
      position: absolute;
      border: 3px dashed red;
      pointer-events: none;
    }
    .video-container {
      display: inline-block;
      position: relative;
    }
  </style>
</head>
<body>
  <h1>ID Card Scanner</h1>
  <button id="startCamera">Start Camera</button><br>
  
  <div class="video-container">
    <video id="video" width="400" height="400" autoplay playsinline></video>
    <div id="overlay"></div>
  </div>
  
  <canvas id="canvas"></canvas><br>
  
  <button id="capture">Capture</button>
  <button id="nextId">Next ID</button>
  <button id="complete">Complete</button>
  
  <div id="status">Status: Camera not started</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const overlay = document.getElementById('overlay');

    let stream;
    let captureStep = 0; // 0 = front, 1 = back
    let currentCard = {};
    let cards = [];

    // Square ratio
    const SQUARE_SIZE = 400;
    canvas.width = SQUARE_SIZE;
    canvas.height = SQUARE_SIZE;

    // Position overlay frame (square)
    function updateOverlay() {
      const vw = video.clientWidth;
      const vh = video.clientHeight;
      const size = Math.min(vw, vh) * 0.8; // 80% of smaller dimension
      overlay.style.width = size + "px";
      overlay.style.height = size + "px";
      overlay.style.left = (vw - size) / 2 + "px";
      overlay.style.top = (vh - size) / 2 + "px";
    }

    window.addEventListener("resize", updateOverlay);
    video.addEventListener("loadedmetadata", updateOverlay);

    // Start back camera with square aspect ratio
    document.getElementById('startCamera').onclick = async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", aspectRatio: 1 }
        });
        video.srcObject = stream;
        status.textContent = "Status: Back camera started (square)";
      } catch (err) {
        status.textContent = "Error: " + err.message;
      }
    };

    // Capture square frame
    document.getElementById('capture').onclick = () => {
      const size = Math.min(video.videoWidth, video.videoHeight);
      const sx = (video.videoWidth - size) / 2;
      const sy = (video.videoHeight - size) / 2;

      ctx.drawImage(video, sx, sy, size, size, 0, 0, canvas.width, canvas.height);
      const imageData = canvas.toDataURL("image/jpeg", 0.9);

      if (captureStep === 0) {
        currentCard.front = imageData;
        status.textContent = "Front side captured. Now scan back side.";
        captureStep = 1;
      } else {
        currentCard.back = imageData;
        status.textContent = "Back side captured. Click Next ID or Complete.";
        captureStep = 0;
      }
    };

    // Save card and reset for next
    document.getElementById('nextId').onclick = () => {
      if (currentCard.front && currentCard.back) {
        cards.push(currentCard);
        currentCard = {};
        status.textContent = "Ready for next ID. Capture front side.";
      } else {
        status.textContent = "Please capture both sides before moving to next ID.";
      }
    };

    // Generate PDF
    document.getElementById('complete').onclick = () => {
      if (currentCard.front && currentCard.back) {
        cards.push(currentCard);
        currentCard = {};
      }
      if (cards.length === 0) {
        status.textContent = "No ID cards captured.";
        return;
      }

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();

      cards.forEach((card, index) => {
        if (index > 0) pdf.addPage();
        pdf.addImage(card.front, "JPEG", 10, 10, 90, 90);
        pdf.addImage(card.back, "JPEG", 110, 10, 90, 90);
      });

      pdf.save("IDCards.pdf");
      status.textContent = "PDF generated with " + cards.length + " ID cards.";
      cards = [];
    };
  </script>
</body>
</html>
