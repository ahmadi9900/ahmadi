<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ID Card Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 3vw;
}
h1 {
  color: #fff;
  margin-bottom: 5vw;
  font-weight: 600;
  letter-spacing: 1px;
  font-size: 6vw;
  text-align: center;
}
.video-container {
  position: relative;
  background: #fff;
  padding: 4vw;
  border-radius: 4vw;
  box-shadow: 0 4vw 10vw rgba(0,0,0,0.25);
  margin-bottom: 5vw;
  width: 90vw;
  max-width: 500px;
}
video {
  width: 100%;
  height: auto;
  object-fit: cover;
  border-radius: 3vw;
  border: 0.5vw solid #eee;
}
canvas { display: none; }
#overlay {
  position: absolute;
  border: 3px dashed #ff4d4d;
  border-radius: 3vw;
  pointer-events: none;
}
.button-column {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3vw;
  width: 90vw;
  max-width: 400px;
}
button {
  width: 100%;
  padding: 4vw;
  font-size: 4vw;
  font-weight: 600;
  border: none;
  border-radius: 3vw;
  cursor: pointer;
  color: white;
  transition: transform 0.08s ease, box-shadow 0.08s ease;
  box-shadow: 0 2vw 5vw rgba(0,0,0,0.2);
}
button:hover { box-shadow: 0 3vw 6vw rgba(0,0,0,0.25); }
button:active { transform: scale(0.95); box-shadow: 0 1vw 3vw rgba(0,0,0,0.2); }
#startCamera { background: linear-gradient(135deg, #00c853, #009624); }
#capture { background: linear-gradient(135deg, #ff9800, #ef6c00); }
#nextId { background: linear-gradient(135deg, #7e57c2, #512da8); }
#complete { background: linear-gradient(135deg, #e53935, #b71c1c); }
#status {
  margin-top: 5vw;
  background: rgba(255,255,255,0.15);
  padding: 3vw;
  border-radius: 3vw;
  color: #fff;
  font-weight: 500;
  backdrop-filter: blur(8px);
  box-shadow: 0 2vw 5vw rgba(0,0,0,0.2);
  text-align: center;
  font-size: 4vw;
}
@media (min-width: 600px) {
  h1 { font-size: 28px; }
  button { font-size: 18px; padding: 16px; }
  #status { font-size: 16px; padding: 12px; }
}
</style>
</head>
<body>
<h1>ID Card Scanner</h1>
<div class="video-container">
  <video id="video" autoplay playsinline></video>
  <div id="overlay"></div>
</div>
<canvas id="canvas"></canvas>
<div class="button-column">
  <button id="startCamera">Start Camera</button>
  <button id="capture">Capture</button>
  <button id="nextId">Next ID</button>
  <button id="complete">Complete</button>
</div>
<div id="status">Status: Camera not started</div>

<!-- OpenCV.js -->
<script async src="https://docs.opencv.org/4.x/opencv.js"></script>
<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');
const overlay = document.getElementById('overlay');

let stream, captureStep = 0, currentCard = {}, cards = [];
const ID_RATIO = 1.586;

// Ultra high resolution
const ID_WIDTH = 4800;
const ID_HEIGHT = Math.round(ID_WIDTH / ID_RATIO);
canvas.width = ID_WIDTH;
canvas.height = ID_HEIGHT;

function updateOverlay() {
  const container = video.parentElement;
  const cw = container.clientWidth;
  const ch = container.clientHeight;
  let ow = cw * 0.9;
  let oh = ow / ID_RATIO;
  if (oh > ch * 0.9) { oh = ch * 0.9; ow = oh * ID_RATIO; }
  overlay.style.width = ow + "px";
  overlay.style.height = oh + "px";
  overlay.style.left = (cw - ow)/2 + "px";
  overlay.style.top = (ch - oh)/2 + "px";
}
window.addEventListener("resize", updateOverlay);
video.addEventListener("loadedmetadata", updateOverlay);

document.getElementById('startCamera').onclick = async () => {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment", width: { ideal: 3840 }, height: { ideal: 2160 } }
    });
    video.srcObject = stream;
    status.textContent = "Status: HD Back camera started";
  } catch (err) {
    status.textContent = "Error: " + err.message;
  }
};

// Robust corner ordering
function orderPoints(pts) {
  let rect = [null,null,null,null];
  let sum = pts.map(p => p.x + p.y);
  let diff = pts.map(p => p.y - p.x);
  rect[0] = pts[sum.indexOf(Math.min(...sum))];
  rect[2] = pts[sum.indexOf(Math.max(...sum))];
  rect[1] = pts[diff.indexOf(Math.min(...diff))];
  rect[3] = pts[diff.indexOf(Math.max(...diff))];
  return rect;
}

function processImage() {
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Filters: contrast, brightness, ultra black boost
  let imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
  let data = imageData.data;
  const contrast = 1.6;
  const brightness = 10;
  const blackBoost = 60; // stronger blacks
  for(let i=0;i<data.length;i+=4){
    data[i] = ((data[i]-128)*contrast+128)+brightness;
    data[i+1] = ((data[i+1]-128)*contrast+128)+brightness;
    data[i+2] = ((data[i+2]-128)*contrast+128)+brightness;
    if(data[i]<100)data[i]-=blackBoost;
    if(data[i+1]<100)data[i+1]-=blackBoost;
    if(data[i+2]<100)data[i+2]-=blackBoost;
    data[i] = Math.max(0,Math.min(255,data[i]));
    data[i+1] = Math.max(0,Math.min(255,data[i+1]));
    data[i+2] = Math.max(0,Math.min(255,data[i+2]));
  }
  ctx.putImageData(imageData,0,0);

  // Perspective crop
  if(typeof cv==='undefined') return;
  let src=cv.imread(canvas), dst=new cv.Mat(), gray=new cv.Mat(), edges=new cv.Mat(), contours=new cv.MatVector(), hierarchy=new cv.Mat();
  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY,0);
  cv.GaussianBlur(gray, gray, new cv.Size(5,5),0);
  cv.Canny(gray, edges, 75,200);
  cv.findContours(edges, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

  let maxArea=0, maxContour=null;
  for(let i=0;i<contours.size();i++){
    let cnt=contours.get(i);
    let area=cv.contourArea(cnt);
    if(area>maxArea){
      let peri=cv.arcLength(cnt,true);
      let approx=new cv.Mat();
      cv.approxPolyDP(cnt, approx, 0.02*peri,true);
      if(approx.rows===4){ maxArea=area; maxContour=approx; } else approx.delete();
    }
  }

  if(maxContour){
    let points=[];
    for(let i=0;i<4;i++) points.push({x:maxContour.data32S[i*2], y:maxContour.data32S[i*2+1]});
    let ordered = orderPoints(points);
    let srcTri=cv.matFromArray(4,1,cv.CV_32FC2,[
      ordered[0].x,ordered[0].y,
      ordered[1].x,ordered[1].y,
      ordered[2].x,ordered[2].y,
      ordered[3].x,ordered[3].y
    ]);
    let dstTri=cv.matFromArray(4,1,cv.CV_32FC2,[
      0,0,
      canvas.width,0,
      canvas.width,canvas.height,
      0,canvas.height
    ]);
    let M=cv.getPerspectiveTransform(srcTri,dstTri);
    cv.warpPerspective(src,dst,M,new cv.Size(canvas.width,canvas.height));
    cv.imshow(canvas,dst);
    M.delete(); srcTri.delete(); dstTri.delete();
  }

  src.delete(); dst.delete(); gray.delete(); edges.delete(); contours.delete(); hierarchy.delete();
}

document.getElementById('capture').onclick = () => {
  processImage();
  const imageData = canvas.toDataURL("image/jpeg",1.0); // max quality
  if(captureStep===0){ currentCard.front=imageData; status.textContent="Front captured. Now scan back."; captureStep=1; }
  else { currentCard.back=imageData; status.textContent="Back captured. Click Next ID or Complete."; captureStep=0; }
};

document.getElementById('nextId').onclick = () => {
  if(currentCard.front && currentCard.back){ cards.push(currentCard); currentCard={}; status.textContent="Ready for next ID."; }
  else status.textContent="Capture both sides first.";
};

document.getElementById('complete').onclick = () => {
  if(currentCard.front && currentCard.back) cards.push(currentCard);
  if(cards.length===0){ status.textContent="No ID cards captured."; return; }
  const { jsPDF }=window.jspdf; const pdf=new jsPDF();
  cards.forEach((card,index)=>{
    if(index>0) pdf.addPage();
    const imgWidth=160, imgHeight=imgWidth/ID_RATIO, pageWidth=pdf.internal.pageSize.getWidth();
    const x=(pageWidth-imgWidth)/2, yFront=30;
    pdf.addImage(card.front,"JPEG",x,yFront,imgWidth,imgHeight);
    pdf.addImage(card.back,"JPEG",x,yFront+imgHeight+25,imgWidth,imgHeight);
  });
  pdf.save("IDCards_Optimized.pdf");
  status.textContent="Ultra-high quality PDF generated.";
  cards=[];
};

document.querySelectorAll("button").forEach(btn=>{
  btn.addEventListener("click",()=>{ btn.style.filter="brightness(1.2)"; setTimeout(()=>btn.style.filter="brightness(1)",100); });
});
</script>
</body>
</html>
