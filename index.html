<style>

  margin-top: 5vw;
  background: rgba(255,255,255,0.15);

<body>

<h1>ID Card Scanner</h1>

<div class="video-container">
  <video id="video" autoplay playsinline></video>
  <div id="overlay"></div>
</div>

<canvas id="canvas"></canvas>

<div class="button-column">
  <button id="startCamera">Start Camera</button>
  <button id="capture">Capture</button>
  <button id="nextId">Next ID</button>
  <button id="complete">Complete</button>
</div>

<div id="status">Status: Camera not started</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

let stream;
let captureStep = 0;
let currentCard = {};
let cards = [];
let cvReady = false;

const ID_RATIO = 1.586;
const ID_WIDTH = 1200;
const ID_HEIGHT = Math.round(ID_WIDTH / ID_RATIO);

canvas.width = ID_WIDTH;
canvas.height = ID_HEIGHT;

/* ===== OpenCV Ready ===== */
cv['onRuntimeInitialized'] = () => {
  cvReady = true;
  status.textContent = "OpenCV loaded. Ready.";
};

/* ===== Start Camera ===== */
document.getElementById('startCamera').onclick = async () => {
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment", width:{ideal:1920}, height:{ideal:1080}}
  });
  video.srcObject = stream;
  status.textContent = "Camera started";
};

/* ===== Process Image (UPDATED FILTER ONLY) ===== */
function processImage() {

  let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let data = imageData.data;

  const contrast = 1.6;
  const brightness = 1;      // ⬇ Lower brightness more
  const blackBoost = 35;     // ⬆ Slightly higher black points

  for (let i = 0; i < data.length; i += 4) {

    data[i]   = ((data[i] - 128) * contrast + 128) + brightness;
    data[i+1] = ((data[i+1] - 128) * contrast + 128) + brightness;
    data[i+2] = ((data[i+2] - 128) * contrast + 128) + brightness;

    if (data[i] < 105) data[i] -= blackBoost;
    if (data[i+1] < 105) data[i+1] -= blackBoost;
    if (data[i+2] < 105) data[i+2] -= blackBoost;

    data[i]   = Math.max(0, Math.min(255, data[i]));
    data[i+1] = Math.max(0, Math.min(255, data[i+1]));
    data[i+2] = Math.max(0, Math.min(255, data[i+2]));
  }

  ctx.putImageData(imageData, 0, 0);

  applyConvolution([
    -1, -1, -1,
    -1,  9, -1,
    -1, -1, -1
  ]);
}

/* ===== Convolution (UNCHANGED) ===== */
function applyConvolution(kernel) {
  const side = 3;
  const halfSide = 1;

  const src = ctx.getImageData(0,0,canvas.width,canvas.height);
  const sw = src.width;
  const sh = src.height;
  const srcData = src.data;

  const output = ctx.createImageData(sw, sh);
  const dstData = output.data;

  for (let y=0; y<sh; y++){
    for (let x=0; x<sw; x++){
      let r=0, g=0, b=0;
      for(let ky=0; ky<side; ky++){
        for(let kx=0; kx<side; kx++){
          const scy=y+ky-halfSide;
          const scx=x+kx-halfSide;
          if(scy>=0 && scy<sh && scx>=0 && scx<sw){
            const srcOffset=(scy*sw+scx)*4;
            const wt=kernel[ky*side+kx];
            r += srcData[srcOffset]*wt;
            g += srcData[srcOffset+1]*wt;
            b += srcData[srcOffset+2]*wt;
          }
        }
      }
      const dstOffset=(y*sw+x)*4;
      dstData[dstOffset]   = Math.min(255, Math.max(0, r | 0));
      dstData[dstOffset+1] = Math.min(255, Math.max(0, g | 0));
      dstData[dstOffset+2] = Math.min(255, Math.max(0, b | 0));
      dstData[dstOffset+3] = 255;
    }
  }

  ctx.putImageData(output,0,0);
}
