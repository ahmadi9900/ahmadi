<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ID Card Scanner</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin: 20px; }
    video, canvas { border: 1px solid #333; margin: 10px; }
    button { margin: 10px; padding: 10px 20px; }
  </style>
</head>
<body>
  <h1>ID Card Scanner</h1>
  <video id="camera" autoplay playsinline></video>
  <canvas id="captureCanvas" width="640" height="400" style="display:none;"></canvas>
  <div>
    <button onclick="scanSide('front')">Scan Front</button>
    <button onclick="scanSide('back')">Scan Back</button>
    <button onclick="nextCard()">Next Card</button>
    <button onclick="complete()">Complete</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    const video = document.getElementById('camera');
    const canvas = document.getElementById('captureCanvas');
    const ctx = canvas.getContext('2d');
    let currentCard = { front: null, back: null };
    let cards = [];

    // Start camera
    navigator.mediaDevices.getUserMedia({ video: { aspectRatio: 1.6 } })
      .then(stream => { video.srcObject = stream; });

    function scanSide(side) {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      currentCard[side] = canvas.toDataURL('image/png');
      alert(side + " side scanned!");
    }

    function nextCard() {
      if (currentCard.front && currentCard.back) {
        cards.push({ ...currentCard });
        currentCard = { front: null, back: null };
        alert("Card saved. Ready for next.");
      } else {
        alert("Please scan both sides first.");
      }
    }

    async function complete() {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();

      cards.forEach((card, index) => {
        if (index > 0) pdf.addPage();
        pdf.addImage(card.front, 'PNG', 10, 10, 180, 120);
        pdf.addPage();
        pdf.addImage(card.back, 'PNG', 10, 10, 180, 120);
      });

      pdf.save("IDCards.pdf");
    }
  </script>
</body>
</html>
