<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID Card Scanner</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  text-align:center;
  font-family:Arial;
  background:#f2f2f2;
}

h2{
  margin-top:20px;
}

video{
  width:95%;
  max-width:420px;
  aspect-ratio:1.586;
  object-fit:cover;
  background:black;
  border-radius:15px;
  margin-top:15px;
}

button{
  padding:12px 20px;
  margin:8px;
  font-size:16px;
  border:none;
  border-radius:8px;
  color:white;
}

#startBtn{ background:#444; }
#captureBtn{ background:#0066ff; }
#nextBtn{ background:#ff9900; }
#completeBtn{ background:#28a745; }

canvas{
  display:none;
}
</style>
</head>

<body>

<h2>ID Card Scanner</h2>

<button id="startBtn">Start Camera</button>

<br>

<video id="video" autoplay playsinline muted></video>

<br>

<button id="captureBtn">Capture</button>
<button id="nextBtn">Next ID</button>
<button id="completeBtn">Complete</button>

<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const startBtn = document.getElementById("startBtn");
const captureBtn = document.getElementById("captureBtn");
const nextBtn = document.getElementById("nextBtn");
const completeBtn = document.getElementById("completeBtn");

let stream;
let ids = [];
let currentFront = null;
let currentBack = null;
let isFront = true;

startBtn.onclick = async () => {
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:"environment"
      },
      audio:false
    });

    video.srcObject = stream;
    await video.play();
    alert("Camera started");

  }catch(err){
    alert("Camera Error: " + err.message);
  }
};

captureBtn.onclick = () => {
  if(!stream){
    alert("Start camera first");
    return;
  }

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  const image = canvas.toDataURL("image/jpeg",1.0);

  if(isFront){
    currentFront = image;
    isFront = false;
    alert("Front captured. Now capture BACK side.");
  }else{
    currentBack = image;
    isFront = true;
    alert("Back captured. Press Next ID.");
  }
};

nextBtn.onclick = () => {
  if(currentFront && currentBack){
    ids.push({front:currentFront, back:currentBack});
    currentFront = null;
    currentBack = null;
    alert("ID saved. Scan next ID.");
  }else{
    alert("Capture both sides first.");
  }
};

completeBtn.onclick = () => {

  if(currentFront && currentBack){
    ids.push({front:currentFront, back:currentBack});
  }

  if(ids.length === 0){
    alert("No IDs scanned.");
    return;
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p","mm","a4");

  ids.forEach((id,index)=>{

    if(index !== 0) pdf.addPage();

    pdf.addImage(id.front,"JPEG",10,20,190,60);
    pdf.addImage(id.back,"JPEG",10,100,190,60);

  });

  pdf.save("ID_Cards.pdf");

};
</script>

</body>
</html>
