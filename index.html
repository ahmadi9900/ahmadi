<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ID Card Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 3vw;
}

h1 {
  color: #ffffff;
  margin-bottom: 5vw;
  font-weight: 600;
  letter-spacing: 1px;
  font-size: 6vw;
  text-align: center;
}

.video-container {
  position: relative;
  background: #ffffff;
  padding: 4vw;
  border-radius: 4vw;
  box-shadow: 0 4vw 10vw rgba(0,0,0,0.25);
  margin-bottom: 5vw;
  width: 90vw;
  max-width: 500px;
}

video {
  width: 100%;
  height: auto;
  object-fit: cover;
  border-radius: 3vw;
  border: 0.5vw solid #eee;
}

canvas { display:none; }

.button-column {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3vw;
  width:90vw;
  max-width:400px;
}

button {
  width:100%;
  padding:4vw;
  font-size:4vw;
  font-weight:600;
  border:none;
  border-radius:3vw;
  cursor:pointer;
  color:white;
  transition:transform .08s ease;
}

button:active { transform:scale(.95); }

#startCamera { background:linear-gradient(135deg,#00c853,#009624); }
#capture { background:linear-gradient(135deg,#ff9800,#ef6c00); }
#nextId { background:linear-gradient(135deg,#7e57c2,#512da8); }
#complete { background:linear-gradient(135deg,#e53935,#b71c1c); }

#status {
  margin-top:5vw;
  background:rgba(255,255,255,.15);
  padding:3vw;
  border-radius:3vw;
  color:#fff;
  font-weight:500;
  backdrop-filter:blur(8px);
  text-align:center;
  font-size:4vw;
}

@media (min-width:600px){
  h1{font-size:28px}
  button{font-size:18px;padding:16px}
  #status{font-size:16px;padding:12px}
}
</style>
</head>

<body>
<h1>ID Card Scanner</h1>

<div class="video-container">
  <video id="video" autoplay playsinline></video>
</div>

<canvas id="canvas"></canvas>

<div class="button-column">
  <button id="startCamera">Start Camera</button>
  <button id="capture">Capture</button>
  <button id="nextId">Next ID</button>
  <button id="complete">Complete</button>
</div>

<div id="status">Status: Loading OpenCV...</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script async src="https://docs.opencv.org/4.x/opencv.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

let stream;
let captureStep = 0;
let currentCard = {};
let cards = [];

const ID_RATIO = 1.586;
const OUTPUT_WIDTH = 1200;
const OUTPUT_HEIGHT = Math.round(OUTPUT_WIDTH / ID_RATIO);

canvas.width = OUTPUT_WIDTH;
canvas.height = OUTPUT_HEIGHT;

cv['onRuntimeInitialized'] = () => {
  status.textContent = "Status: Ready";
};

document.getElementById('startCamera').onclick = async () => {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"environment" }
    });
    video.srcObject = stream;
    status.textContent = "Camera started";
  } catch(err){
    status.textContent = "Camera error: " + err.message;
  }
};

function autoCropPerspective(){

  ctx.drawImage(video,0,0,canvas.width,canvas.height);

  let src = cv.imread(canvas);
  let gray = new cv.Mat();
  let blur = new cv.Mat();
  let edge = new cv.Mat();

  cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);
  cv.GaussianBlur(gray,blur,new cv.Size(5,5),0);
  cv.Canny(blur,edge,75,200);

  let contours = new cv.MatVector();
  let hierarchy = new cv.Mat();
  cv.findContours(edge,contours,hierarchy,cv.RETR_LIST,cv.CHAIN_APPROX_SIMPLE);

  let biggest=null;
  let maxArea=0;

  for(let i=0;i<contours.size();i++){
    let cnt=contours.get(i);
    let area=cv.contourArea(cnt);
    if(area>5000){
      let peri=cv.arcLength(cnt,true);
      let approx=new cv.Mat();
      cv.approxPolyDP(cnt,approx,0.02*peri,true);
      if(approx.rows===4 && area>maxArea){
        biggest=approx;
        maxArea=area;
      }
    }
  }

  if(!biggest){
    status.textContent="No card detected. Try again.";
    src.delete();gray.delete();blur.delete();edge.delete();
    contours.delete();hierarchy.delete();
    return null;
  }

  let pts=[];
  for(let i=0;i<4;i++){
    pts.push({
      x:biggest.intPtr(i,0)[0],
      y:biggest.intPtr(i,0)[1]
    });
  }

  pts.sort((a,b)=>a.y-b.y);
  let top=pts.slice(0,2).sort((a,b)=>a.x-b.x);
  let bottom=pts.slice(2,4).sort((a,b)=>a.x-b.x);
  let ordered=[top[0],top[1],bottom[1],bottom[0]];

  let srcTri=cv.matFromArray(4,1,cv.CV_32FC2,[
    ordered[0].x,ordered[0].y,
    ordered[1].x,ordered[1].y,
    ordered[2].x,ordered[2].y,
    ordered[3].x,ordered[3].y
  ]);

  let dstTri=cv.matFromArray(4,1,cv.CV_32FC2,[
    0,0,
    OUTPUT_WIDTH,0,
    OUTPUT_WIDTH,OUTPUT_HEIGHT,
    0,OUTPUT_HEIGHT
  ]);

  let M=cv.getPerspectiveTransform(srcTri,dstTri);
  let dst=new cv.Mat();
  cv.warpPerspective(src,dst,M,new cv.Size(OUTPUT_WIDTH,OUTPUT_HEIGHT));

  cv.imshow(canvas,dst);

  let result=canvas.toDataURL("image/jpeg",0.9);

  src.delete();gray.delete();blur.delete();edge.delete();
  contours.delete();hierarchy.delete();
  dst.delete();srcTri.delete();dstTri.delete();M.delete();

  return result;
}

document.getElementById('capture').onclick=()=>{
  let imageData=autoCropPerspective();
  if(!imageData) return;

  if(captureStep===0){
    currentCard.front=imageData;
    captureStep=1;
    status.textContent="Front captured. Scan back side.";
  }else{
    currentCard.back=imageData;
    captureStep=0;
    status.textContent="Back captured.";
  }
};

document.getElementById('nextId').onclick=()=>{
  if(currentCard.front && currentCard.back){
    cards.push(currentCard);
    currentCard={};
    status.textContent="Ready for next ID.";
  }else{
    status.textContent="Capture both sides first.";
  }
};

document.getElementById('complete').onclick=()=>{
  if(currentCard.front && currentCard.back){
    cards.push(currentCard);
    currentCard={};
  }

  if(cards.length===0){
    status.textContent="No cards captured.";
    return;
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  cards.forEach((card,i)=>{
    if(i>0) pdf.addPage();
    const w=160;
    const h=w/ID_RATIO;
    const x=(pdf.internal.pageSize.getWidth()-w)/2;
    pdf.addImage(card.front,"JPEG",x,30,w,h);
    pdf.addImage(card.back,"JPEG",x,30+h+25,w,h);
  });

  pdf.save("IDCards_AutoCrop.pdf");
  cards=[];
  status.textContent="PDF Generated.";
};
</script>
</body>
</html>
