<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ID Card Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 3vw;
}

h1 {
  color: #ffffff;
  margin-bottom: 5vw;
  font-weight: 600;
  font-size: 6vw;
  text-align: center;
}

.video-container {
  position: relative;
  background: #ffffff;
  padding: 4vw;
  border-radius: 4vw;
  box-shadow: 0 4vw 10vw rgba(0,0,0,0.25);
  margin-bottom: 5vw;
  width: 90vw;
  max-width: 500px;
}

video {
  width: 100%;
  border-radius: 3vw;
  border: 0.5vw solid #eee;
}

canvas { display: none; }

#overlay {
  position: absolute;
  border: 3px dashed #ff4d4d;
  border-radius: 3vw;
  pointer-events: none;
}

.button-column {
  display: flex;
  flex-direction: column;
  gap: 3vw;
  width: 90vw;
  max-width: 400px;
}

button {
  padding: 4vw;
  font-size: 4vw;
  font-weight: 600;
  border: none;
  border-radius: 3vw;
  cursor: pointer;
  color: white;
}

#startCamera { background: linear-gradient(135deg, #00c853, #009624); }
#capture { background: linear-gradient(135deg, #ff9800, #ef6c00); }
#nextId { background: linear-gradient(135deg, #7e57c2, #512da8); }
#complete { background: linear-gradient(135deg, #e53935, #b71c1c); }

#status {
  margin-top: 5vw;
  background: rgba(255,255,255,0.15);
  padding: 3vw;
  border-radius: 3vw;
  color: #ffffff;
  text-align: center;
  font-size: 4vw;
}
</style>

<script src="https://docs.opencv.org/4.x/opencv.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<h1>ID Card Scanner</h1>

<div class="video-container">
  <video id="video" autoplay playsinline></video>
  <div id="overlay"></div>
</div>

<canvas id="canvas"></canvas>

<div class="button-column">
  <button id="startCamera">Start Camera</button>
  <button id="capture">Capture</button>
  <button id="nextId">Next ID</button>
  <button id="complete">Complete</button>
</div>

<div id="status">Status: Camera not started</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

let stream;
let captureStep = 0;
let currentCard = {};
let cards = [];
let cvReady = false;

const ID_RATIO = 1.586;
const ID_WIDTH = 1200;
const ID_HEIGHT = Math.round(ID_WIDTH / ID_RATIO);

canvas.width = ID_WIDTH;
canvas.height = ID_HEIGHT;

cv['onRuntimeInitialized'] = () => {
  cvReady = true;
  status.textContent = "OpenCV loaded. Ready.";
};

document.getElementById('startCamera').onclick = async () => {
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment", width:{ideal:1920}, height:{ideal:1080}}
  });
  video.srcObject = stream;
  status.textContent = "Camera started";
};

/* ===== CAPTURE WITH AUTO-CROP & EDGE DETECTION ===== */
document.getElementById('capture').onclick = () => {

  if (!cvReady) {
    status.textContent = "OpenCV still loading...";
    return;
  }

  const tempCanvas = document.createElement("canvas");
  tempCanvas.width = video.videoWidth;
  tempCanvas.height = video.videoHeight;
  const tempCtx = tempCanvas.getContext("2d");
  tempCtx.drawImage(video, 0, 0);

  let src = cv.imread(tempCanvas);
  let gray = new cv.Mat();
  let blur = new cv.Mat();
  let edges = new cv.Mat();
  let contours = new cv.MatVector();
  let hierarchy = new cv.Mat();

  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
  cv.GaussianBlur(gray, blur, new cv.Size(5,5), 0);
  cv.Canny(blur, edges, 75, 200);
  cv.findContours(edges, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

  let biggest = null;
  let maxArea = 0;

  for (let i=0;i<contours.size();i++){
    let cnt = contours.get(i);
    let area = cv.contourArea(cnt);
    if(area>maxArea){
      let peri = cv.arcLength(cnt,true);
      let approx = new cv.Mat();
      cv.approxPolyDP(cnt,approx,0.02*peri,true);
      if(approx.rows===4){
        biggest=approx;
        maxArea=area;
      }
    }
  }

  if(!biggest){
    status.textContent="No card detected.";
    return;
  }

  let pts=[];
  for(let i=0;i<4;i++){
    pts.push({
      x:biggest.intPtr(i,0)[0],
      y:biggest.intPtr(i,0)[1]
    });
  }

  pts.sort((a,b)=>a.y-b.y);
  let top=pts.slice(0,2).sort((a,b)=>a.x-b.x);
  let bottom=pts.slice(2,4).sort((a,b)=>a.x-b.x);
  let ordered=[top[0],top[1],bottom[1],bottom[0]];

  let srcTri=cv.matFromArray(4,1,cv.CV_32FC2,[
    ordered[0].x, ordered[0].y,
    ordered[1].x, ordered[1].y,
    ordered[2].x, ordered[2].y,
    ordered[3].x, ordered[3].y
  ]);

  let dstTri=cv.matFromArray(4,1,cv.CV_32FC2,[
    0,0,
    ID_WIDTH,0,
    ID_WIDTH,ID_HEIGHT,
    0,ID_HEIGHT
  ]);

  let M=cv.getPerspectiveTransform(srcTri,dstTri);
  let dst=new cv.Mat();

  cv.warpPerspective(src,dst,M,new cv.Size(ID_WIDTH,ID_HEIGHT),cv.INTER_CUBIC);

  cv.imshow(canvas,dst); // draw original cropped image (no filters)

  src.delete(); gray.delete(); blur.delete();
  edges.delete(); contours.delete(); hierarchy.delete(); dst.delete();

  const imageData = canvas.toDataURL("image/jpeg", 1.0);

  if(captureStep===0){
    currentCard.front=imageData;
    status.textContent="Front captured.";
    captureStep=1;
  } else {
    currentCard.back=imageData;
    status.textContent="Back captured.";
    captureStep=0;
  }
};

document.getElementById('nextId').onclick = () => {
  if(currentCard.front && currentCard.back){
    cards.push(currentCard);
    currentCard={};
    captureStep=0;
    status.textContent="Ready for next ID.";
  } else {
    status.textContent="Capture both sides first.";
  }
};

document.getElementById('complete').onclick = () => {

  if(currentCard.front && currentCard.back){
    cards.push(currentCard);
    currentCard={};
  }

  if(cards.length === 0){
    status.textContent = "No ID cards captured.";
    return;
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p","mm","a4");
  const pageWidth = pdf.internal.pageSize.getWidth();

  cards.forEach((card,index)=>{
    if(index>0) pdf.addPage();

    const imgWidth = pageWidth * 0.68;
    const imgHeight = imgWidth / ID_RATIO;

    const x = (pageWidth - imgWidth)/2;
    const yFront = 20;
    const yBack = yFront + imgHeight + 15;

    if(card.front) pdf.addImage(card.front,"JPEG",x,yFront,imgWidth,imgHeight);
    if(card.back) pdf.addImage(card.back,"JPEG",x,yBack,imgWidth,imgHeight);
  });

  pdf.save("IDCards_Original.pdf");
  cards=[];
};
</script>

</body>
</html>
